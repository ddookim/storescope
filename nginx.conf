# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=webhook:10m rate=10r/m;

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header Referrer-Policy           "strict-origin"     always;
    add_header X-XSS-Protection          "1; mode=block"    always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 1m;

    # Landing page (정적 HTML)
    location = / {
        root   /opt/storescope/landing;
        try_files /index.html =404;
    }
    location ~* \.(css|js|png|jpg|ico|svg|woff2?)$ {
        root   /opt/storescope/landing;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # FastAPI — 일반 엔드포인트
    location /api/ {
        limit_req zone=api burst=10 nodelay;

        proxy_pass             http://127.0.0.1:8000/;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     30s;
        proxy_connect_timeout  5s;
        proxy_send_timeout     30s;
    }

    # Paddle 웹훅 — 별도 zone (더 엄격)
    location /api/billing/webhook {
        limit_req zone=webhook burst=5 nodelay;

        proxy_pass             http://127.0.0.1:8000/billing/webhook;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     30s;
        proxy_connect_timeout  5s;
    }

    # Streamlit (Store X-Ray 무료 툴)
    location /xray {
        proxy_pass             http://127.0.0.1:8501;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_read_timeout     86400s;  # WebSocket 장기 연결
        rewrite                ^/xray(/.*)? /$1 break;
    }
}
