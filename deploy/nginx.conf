# StoreScope — nginx 리버스 프록시
# 배포: cp nginx.conf /etc/nginx/sites-available/storescope
#        ln -s /etc/nginx/sites-available/storescope /etc/nginx/sites-enabled/
#        nginx -t && systemctl reload nginx
#
# certbot 실행 후 이 파일에 SSL 블록이 자동 추가됨:
#   certbot --nginx -d api.YOUR_DOMAIN.com -d app.YOUR_DOMAIN.com

# FIX: Rate Limit zone 정의 — 봇 크롤/DDoS로 DB 커넥션 풀 소진 방지.
# 10m 공유 메모리 = 약 160,000개 IP 추적 가능. Lean VPS에서 무시할 수 있는 비용.
limit_req_zone $binary_remote_addr zone=api_general:10m  rate=60r/m;   # 일반 API: 1req/초
limit_req_zone $binary_remote_addr zone=api_search:10m   rate=20r/m;   # 검색: 남용 방지
limit_req_zone $binary_remote_addr zone=api_webhook:10m  rate=10r/m;   # 웹훅: 스팸 차단
limit_req_zone $binary_remote_addr zone=api_export:10m   rate=5r/m;    # CSV export: 부하 제한

# FIX: 레이트 리밋 초과 시 503(Service Unavailable) 대신 RFC 6585 준수 429 반환.
# 503은 서버 장애로 오인되어 모니터링 경보를 유발. 429는 클라이언트가 백오프 처리 가능.
limit_req_status 429;

# FIX: 레이트 리밋 로그를 error → warn 레벨로 낮춤.
# 합법적인 burst 트래픽에서 error 로그 폭주로 실제 오류가 묻히는 것을 방지.
limit_req_log_level warn;

# ── 공통 프록시 헤더 스니펫 ──────────────────────────────────────
# (nginx 1.9.2+ map/include 대신 중복 선언으로 호환성 확보)

# ── API 서버 (FastAPI :8000) ──────────────────────────────────
server {
    listen 80;
    server_name api.YOUR_DOMAIN.com;

    # FIX(1): Certbot ACME 챌린지 경로는 HTTPS 리다이렉트에서 제외.
    # 인증서가 없는 최초 배포 시 Nginx가 이 경로로 HTTP 응답해야 Let's Encrypt가 도메인 소유를 검증할 수 있다.
    # 이 블록 없이 301 리다이렉트만 있으면 certbot이 응답을 받지 못해 인증서 발급 자체가 불가능해진다.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.YOUR_DOMAIN.com;

    ssl_certificate     /etc/letsencrypt/live/api.YOUR_DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.YOUR_DOMAIN.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # FIX(2): HSTS 및 기본 보안 헤더.
    # HSTS: 브라우저가 이후 요청을 강제로 HTTPS로 전송 (중간자 공격 방지).
    # X-Content-Type-Options: MIME 스니핑 차단.
    # X-Frame-Options: 클릭재킹 방지.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "DENY"                                 always;
    # FIX: API 서버는 JSON only — CSP를 최대한 제한적으로 설정.
    # default-src 'none': 브라우저에서 직접 접근 시 모든 리소스 로드 차단.
    add_header Content-Security-Policy   "default-src 'none'"                  always;
    add_header Referrer-Policy           "no-referrer"                         always;

    # CSV export — Pro 전용, 부하 높음
    location /export/ {
        limit_req zone=api_export burst=2 nodelay;
        proxy_pass            http://127.0.0.1:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 5s;
        client_max_body_size  1m;
    }

    # 검색 엔드포인트 — 별도 엄격 zone
    location /search {
        limit_req zone=api_search burst=5 nodelay;
        proxy_pass            http://127.0.0.1:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    30s;
        proxy_connect_timeout 5s;
        client_max_body_size  1m;
    }

    # Paddle 웹훅: raw body 필요 — 버퍼링 비활성화
    location /billing/webhook {
        limit_req zone=api_webhook burst=3 nodelay;
        proxy_pass              http://127.0.0.1:8000;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout      30s;
        proxy_connect_timeout   5s;
        client_max_body_size    1m;
    }

    location / {
        # FIX: 일반 API Rate Limit — 60 req/min (burst 20) 초과 시 503 반환
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass            http://127.0.0.1:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    30s;
        proxy_connect_timeout 5s;
        client_max_body_size  1m;
    }
}

# ── Streamlit 앱 (:8501) ─────────────────────────────────────
server {
    listen 80;
    server_name app.YOUR_DOMAIN.com;

    # FIX(1): API 블록과 동일한 이유 — ACME 챌린지 HTTP 통과 필수.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name app.YOUR_DOMAIN.com;

    ssl_certificate     /etc/letsencrypt/live/app.YOUR_DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.YOUR_DOMAIN.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "SAMEORIGIN"                           always;
    # FIX: Streamlit CSP — script-src 'unsafe-inline' 및 'unsafe-eval'은 Streamlit 프레임워크 요구사항.
    # img-src data: blob: — Streamlit 차트/이미지 렌더링에 필요.
    # connect-src 'self' wss: — WebSocket 연결 허용.
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' wss: https://www.google-analytics.com; font-src 'self' data:" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    location / {
        proxy_pass         http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # Streamlit WebSocket 필수 — 없으면 실시간 업데이트 차단됨
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # FIX(3): X-Forwarded-For / X-Forwarded-Proto 누락 시 Streamlit이 요청을 HTTP로 인식.
        # HTTPS 리다이렉트 루프 또는 mixed-content 경고의 원인이 된다.
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
    }
}
