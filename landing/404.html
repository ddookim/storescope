<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Not found — StoreScope</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%234F46E5'/%3E%3Cpath d='M9 20l5-5 4 4 5-6' stroke='%23fff' stroke-width='2.6' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #1f2937;
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      max-width: 480px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      font: 600 11px/1 -apple-system, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      background: #fff;
      border: 1px solid #e5e7eb;
      padding: 0.5rem 0.75rem;
      border-radius: 99px;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      color: #111827;
    }
    p {
      font-size: 1.0625rem;
      color: #6b7280;
      margin-bottom: 2rem;
    }
    a.btn {
      display: inline-block;
      font: 600 15px/1 -apple-system, sans-serif;
      color: #fff;
      background: #4F46E5;
      padding: 0.875rem 1.5rem;
      border-radius: 10px;
      text-decoration: none;
      min-height: 44px;
      min-width: 44px;
      transition: background 0.15s ease;
    }
    a.btn:hover { background: #4338CA; }
    a.btn:focus-visible { outline: 3px solid #c7d2fe; outline-offset: 2px; }
    a.btn:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">404 · Not Found</span>
    <h1>That page doesn't exist.</h1>
    <p>Maybe you wanted to look at the products gaining traction across 1,400+ Shopify stores this week.</p>
    <a class="btn" href="/storescope/">Back to StoreScope →</a>
  </div>
</body>
</html>
